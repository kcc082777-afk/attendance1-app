<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="出勤與成本"/>
<title>工程出勤薪資與施工成本管理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f1f5f9;min-height:100vh}
.header{background:#1e40af;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;font-weight:700}
.header .sub{font-size:11px;opacity:.8;margin-top:2px}
.header .today{font-size:12px;opacity:.9}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;overflow-x:auto}
.tab{flex:1;padding:11px 0;border:none;background:transparent;color:#64748b;font-weight:400;border-bottom:3px solid transparent;cursor:pointer;font-size:12px;white-space:nowrap;min-width:60px;text-align:center}
.tab.active{background:#eff6ff;color:#1e40af;font-weight:700;border-bottom:3px solid #1e40af}
.content{padding:14px}
.card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.emp-card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.emp-name{font-weight:700;font-size:15px}
.emp-wage{font-size:12px;color:#94a3b8}
.status-btn{border:none;border-radius:20px;padding:6px 16px;font-weight:700;font-size:13px;cursor:pointer;color:#fff}
.bonus-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.bonus-row label{font-size:13px;color:#64748b;white-space:nowrap}
.bonus-row input{flex:1;padding:5px 8px;border-radius:8px;border:1px solid #e2e8f0;font-size:14px}
.hint{margin-top:6px;font-size:11px;color:#94a3b8}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.stat-item{background:#f8fafc;border-radius:8px;padding:8px 10px}
.stat-label{font-size:11px;color:#94a3b8;margin-bottom:2px}
.stat-value{font-weight:700;font-size:14px;color:#1e293b}
.total-box{background:#eff6ff;border-radius:10px;padding:10px 14px;text-align:center}
.total-label{font-size:12px;color:#3b82f6;font-weight:600;margin-bottom:2px}
.total-amount{font-size:22px;font-weight:800;color:#1e40af}
.total-detail{font-size:11px;color:#93c5fd;margin-top:2px}
.grand-total{background:#1e40af;color:#fff;border-radius:12px;padding:16px;margin-top:16px;text-align:center}
.grand-total .label{font-size:14px;opacity:.85;margin-bottom:4px}
.grand-total .amount{font-size:28px;font-weight:800}
.period-bar{background:#fff;border-radius:12px;padding:12px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.period-bar label{font-size:14px;font-weight:600;color:#475569}
select,input[type=date],input[type=number],input[type=text],textarea{padding:6px 10px;border-radius:8px;border:1px solid #cbd5e1;font-size:14px}
.history-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #f1f5f9;gap:12px}
.history-date{font-size:13px;color:#475569;min-width:90px}
.badge{border-radius:12px;padding:3px 12px;font-size:12px;font-weight:700;color:#fff;text-align:center;min-width:48px}
.bonus-badge{font-size:12px;color:#8b5cf6;font-weight:600}
.project-card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px}
.project-title{font-weight:700;font-size:16px;color:#1e293b;margin-bottom:6px}
.project-desc{font-size:13px;color:#64748b;margin-bottom:8px}
.member-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.member-tag{background:#eff6ff;color:#1e40af;border-radius:12px;padding:2px 10px;font-size:12px;font-weight:600}
.photo-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.photo-grid img{width:90px;height:90px;object-fit:cover;border-radius:8px;border:1px solid #e2e8f0}
.btn{border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-weight:600;font-size:13px}
.btn-primary{background:#1e40af;color:#fff}
.btn-secondary{background:#e2e8f0;color:#475569}
.btn-danger{background:#ef4444;color:#fff}
.btn-add{background:#1e40af;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:5px}
.form-group input,.form-group textarea{width:100%}
.member-select-btn{padding:5px 12px;border-radius:20px;font-size:13px;cursor:pointer;border:none;font-weight:600}
.empty{text-align:center;color:#94a3b8;padding:40px;font-size:15px}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-row .btn{flex:1;padding:8px 0;text-align:center}
.date-row{margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.date-row label{font-size:14px;color:#475569;font-weight:600}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.photo-upload-btn{background:#f1f5f9;border:1px dashed #94a3b8;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px;color:#64748b}
.new-photo-wrap{position:relative;display:inline-block}
.new-photo-wrap img{width:70px;height:70px;object-fit:cover;border-radius:8px;border:1px solid #e2e8f0}
.del-photo{position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.new-photos{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}

/* 成本專用樣式 */
.cost-box {background:#fff7ed;border:1px dashed #fed7aa;border-radius:8px;padding:10px;margin-top:10px}
.cost-title {font-size:13px;font-weight:700;color:#c2410c;margin-bottom:6px}
.cost-item-detail {font-size:12px;color:#7c2d12;display:flex;justify-content:space-between;margin-bottom:2px}
.cost-total-row {border-top:1px solid #fed7aa;padding-top:4px;margin-top:4px;font-weight:700;color:#9a3412;display:flex;justify-content:space-between}
.dynamic-row {display:flex;gap:6px;margin-bottom:6px}
.dynamic-row input[type=text] {flex:2}
.dynamic-row input[type=number] {flex:1}
</style>
</head>
<body>
<div id="app"></div>
<script>
const EMPLOYEES_KEY='att_employees';
const RECORDS_KEY='att_records';
const PROJECTS_KEY='att_projects';
const MACHINES_KEY='att_machines';

const DEFAULT_EMP=[
  {id:1,name:'員工A',dailyWage:1200},
  {id:2,name:'員工B',dailyWage:1500},
  {id:3,name:'員工C',dailyWage:1300},
  {id:4,name:'員工D',dailyWage:1100},
  {id:5,name:'員工E',dailyWage:1400},
];

const DEFAULT_MACHINES=[
  {id:1,name:'怪手 (挖土機)',dailyCost:5000},
  {id:2,name:'山貓 (小型裝載機)',dailyCost:3500},
  {id:3,name:'發電機',dailyCost:800},
];

const STATUS_ORDER=['none','present','half','leave','absent'];
const STATUS_LABEL={none:'未記錄',present:'出勤',half:'半天',leave:'請假',absent:'缺勤'};
const STATUS_COLOR={none:'#94a3b8',present:'#22c55e',half:'#06b6d4',leave:'#f59e0b',absent:'#ef4444'};

let employees=JSON.parse(localStorage.getItem(EMPLOYEES_KEY)||'null')||DEFAULT_EMP;
let machines=JSON.parse(localStorage.getItem(MACHINES_KEY)||'null')||DEFAULT_MACHINES;
let records=JSON.parse(localStorage.getItem(RECORDS_KEY)||'{}');
let projects=JSON.parse(localStorage.getItem(PROJECTS_KEY)||'{}');

function save(){
  localStorage.setItem(EMPLOYEES_KEY,JSON.stringify(employees));
  localStorage.setItem(MACHINES_KEY,JSON.stringify(machines));
  localStorage.setItem(RECORDS_KEY,JSON.stringify(records));
  localStorage.setItem(PROJECTS_KEY,JSON.stringify(projects));
}

function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return`${y}年${m}月${d}日`}
function getDays(y,m){return new Date(y,m,0).getDate()}
function periodDates(y,m,h){
  const s=h===1?1:16,e=h===1?15:getDays(y,m);
  const r=[];
  for(let d=s; d<=e; d++)r.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  return r;
}
function nowPeriod(){
  const n=new Date(),d=n.getDate();
  return{year:n.getFullYear(),month:n.getMonth()+1,half:d<=15?1:2};
}
function getRecord(date,eid){return(records[date]&&records[date][eid])||{status:'none',bonus:0}}
function setRecord(date,eid,field,val){
  if(!records[date])records[date]={};
  if(!records[date][eid])records[date][eid]={status:'none',bonus:0};
  records[date][eid][field]=val;save();
}

function getEmpWageOnDay(date,eid){
  const emp=employees.find(e=>e.id===eid);
  if(!emp)return 0;
  const rec=getRecord(date,eid);
  let multi=0;
  if(rec.status==='present')multi=1;
  else if(rec.status==='half')multi=0.5;
  return (emp.dailyWage * multi) + Number(rec.bonus||0);
}

let state={
  tab:'attendance',
  selectedDate:today(),
  period:nowPeriod(),
  historyEmp:null,
  historyMonth:{year:new Date().getFullYear(),month:new Date().getMonth()+1},
  editEmp:null,
  editMach:null,
  showAddProject:false,
  viewProject:null,
  newProject:{name:'',desc:'',members:[],machines:[],materials:[]}, 
};

function setState(patch){Object.assign(state,patch);render()}

function render(){
  const app=document.getElementById('app');
  const per=state.period;
  const perLabel=`${per.year}年${per.month}月 ${per.half===1?'上半月 (1~15日)':'下半月 (16~月底)'}`;
  app.innerHTML=`
  <div class="header">
    <div><div class="header h1">📋 工程出勤與成本系統</div><div class="sub">${perLabel}</div></div>
    <div class="today">今日：${today()}</div>
  </div>
  <div class="tabs">
    ${[['attendance','📅 出勤點名'],['site','🏗️ 施工成本'],['report','📊 薪資結算'],['history','📁 個人歷史'],['settings','⚙️ 後台設定']].map(([k,l])=>`<button class="tab${state.tab===k?' active':''}">${l}</button>`).join('')}
  </div>
  <div class="content" id="tab-content"></div>`;
  
  app.querySelectorAll('.tab').forEach((btn,i)=>{
    const keys=['attendance','site','report','history','settings'];
    btn.onclick=()=>setState({tab:keys[i]});
  });
  const tc=document.getElementById('tab-content');
  if(state.tab==='attendance')renderAttendance(tc);
  else if(state.tab==='site')renderSite(tc);
  else if(state.tab==='report')renderReport(tc);
  else if(state.tab==='history')renderHistory(tc);
  else if(state.tab==='settings')renderSettings(tc);
}

function renderAttendance(tc){
  tc.innerHTML=`
  <div class="date-row">
    <label>選擇日期：</label>
    <input type="date" id="sel-date" value="${state.selectedDate}"/>
  </div>
  <div class="grid" id="emp-grid"></div>`;
  document.getElementById('sel-date').onchange=e=>setState({selectedDate:e.target.value});
  const grid=document.getElementById('emp-grid');
  employees.forEach(emp=>{
    const rec=getRecord(state.selectedDate,emp.id);
    const st=rec.status||'none';
    const color=STATUS_COLOR[st];
    const div=document.createElement('div');
    div.className='emp-card';
    div.style.borderLeft=`5px solid ${color}`;
    div.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div><div class="emp-name">${emp.name}</div><div class="emp-wage">日薪 NT$ ${emp.dailyWage.toLocaleString()}</div></div>
        <button class="status-btn" style="background:${color}">${STATUS_LABEL[st]}</button>
      </div>
      <div class="bonus-row">
        <label>加給 NT$</label>
        <input type="number" min="0" value="${rec.bonus||''}" placeholder="0" class="bonus-input"/>
      </div>`;
    div.querySelector('.status-btn').onclick=()=>{
      const cur=getRecord(state.selectedDate,emp.id).status||'none';
      const idx=STATUS_ORDER.indexOf(cur);
      const next=STATUS_ORDER[(idx+1)%STATUS_ORDER.length];
      setRecord(state.selectedDate,emp.id,'status',next);render();
    };
    div.querySelector('.bonus-input').onchange=e=> {
      setRecord(state.selectedDate,emp.id,'bonus',Number(e.target.value));
    };
    grid.appendChild(div);
  });
}

function renderSite(tc){
  const dayProjects=projects[state.selectedDate]||[];
  tc.innerHTML=`
  <div class="top-row">
    <div class="date-row" style="margin:0">
      <label>施工日期：</label>
      <input type="date" id="site-date" value="${state.selectedDate}"/>
    </div>
    <button class="btn-add" id="add-proj-btn">＋ 新增施工項目</button>
  </div>
  <div id="add-proj-form"></div>
  <div id="proj-list"></div>`;
  
  document.getElementById('site-date').onchange=e=>setState({selectedDate:e.target.value});
  document.getElementById('add-proj-btn').onclick=()=>setState({showAddProject:true});
  
  if(state.showAddProject){
    const formDiv=document.getElementById('add-proj-form');
    formDiv.innerHTML=`
    <div class="card" style="background:#f8fafc;border:1px solid #cbd5e1">
      <div style="font-weight:700;font-size:15px;margin-bottom:12px;color:#1e40af">🏗️ 新增施工項目 — ${fmtDate(state.selectedDate)}</div>
      <div class="form-group"><label>施工項目名稱*</label><input type="text" id="proj-name" value="${state.newProject.name}" placeholder="如：A棟地基灌漿"/></div>
      <div class="form-group"><label>工作敘述</label><textarea id="proj-desc" rows="2" placeholder="備註說明">${state.newProject.desc}</textarea></div>
      
      <div class="form-group">
        <label>1. 派遣施工人員 (費用連動當日出勤薪資)：</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${employees.map(e=>{
            const isSel=state.newProject.members.includes(e.id);
            const todayCost=getEmpWageOnDay(state.selectedDate,e.id);
            return `<button class="member-select-btn" data-type="emp" data-id="${e.id}" style="background:${isSel?'#1e40af':'#e2e8f0'};color:${isSel?'#fff':'#475569'}">${e.name} (今日:$${todayCost})</button>`;
          }).join('')}
        </div>
      </div>

      <div class="form-group">
        <label>2. 使用機械項目 (自訂機械進場成本)：</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${machines.map(m=>{
            const isSel=state.newProject.machines.includes(m.id);
            return `<button class="member-select-btn" data-type="mach" data-id="${m.id}" style="background:${isSel?'#ea580c':'#e2e8f0'};color:${isSel?'#fff':'#475569'}">${m.name} ($${m.dailyCost})</button>`;
          }).join('')}
        </div>
      </div>

      <div class="form-group">
        <label>3. 消耗材料費用憑證：</label>
        <div id="material-rows">
          ${state.newProject.materials.map((mat,idx)=>`
            <div class="dynamic-row">
              <input type="text" placeholder="材料/耗材名稱" value="${mat.name}" data-idx="${idx}" class="mat-name"/>
              <input type="number" placeholder="金額" value="${mat.cost||''}" data-idx="${idx}" class="mat-cost"/>
              <button class="btn btn-secondary del-mat-btn" data-idx="${idx}" style="padding:4px 10px">✕</button>
            </div>
          `).join('')}
        </div>
        <button class="btn btn-secondary" id="add-mat-btn" style="padding:4px 10px;font-size:12px;margin-top:4px">＋ 增加耗材項目</button>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="save-proj">儲存項目</button>
        <button class="btn btn-secondary" id="cancel-proj">取消</button>
      </div>
    </div>`;

    document.getElementById('proj-name').oninput=e=>state.newProject.name=e.target.value;
    document.getElementById('proj-desc').oninput=e=>state.newProject.desc=e.target.value;
    
    document.querySelectorAll('.member-select-btn').forEach(btn=>{
      btn.onclick=()=>{
        const id=parseInt(btn.dataset.id);
        if(btn.dataset.type==='emp'){
          const m=state.newProject.members;
          state.newProject.members=m.includes(id)?m.filter(x=>x!==id):[...m,id];
        }else{
          const mac=state.newProject.machines;
          state.newProject.machines=mac.includes(id)?mac.filter(x=>x!==id):[...mac,id];
        }
        renderSite(tc);
      };
    });

    document.getElementById('add-mat-btn').onclick=()=>{
      state.newProject.materials.push({name:'',cost:0});
      renderSite(tc);
    };

    document.querySelectorAll('.mat-name').forEach(input=>{
      input.oninput=e=>{state.newProject.materials[e.target.dataset.idx].name=e.target.value};
    });
    document.querySelectorAll('.mat-cost').forEach(input=>{
      input.oninput=e=>{state.newProject.materials[e.target.dataset.idx].cost=Number(e.target.value)||0};
    });
    document.querySelectorAll('.del-mat-btn').forEach(btn=>{
      btn.onclick=()=>{
        state.newProject.materials.splice(parseInt(btn.dataset.idx),1);
        renderSite(tc);
      };
    });

    document.getElementById('save-proj').onclick=()=>{
      const name=document.getElementById('proj-name').value.trim();
      if(!name)return alert('請輸入施工項目名稱');
      if(!projects[state.selectedDate])projects[state.selectedDate]=[];
      projects[state.selectedDate].push({
        id:Date.now(),
        name,
        desc:document.getElementById('proj-desc').value,
        members:[...state.newProject.members],
        machines:[...state.newProject.machines],
        materials:state.newProject.materials.filter(m=>m.name.trim()!=='').map(m=>({...m}))
      });
      save();
      setState({showAddProject:false,newProject:{name:'',desc:'',members:[],machines:[],materials:[]}});
    };
    document.getElementById('cancel-proj').onclick=()=>setState({showAddProject:false,newProject:{name:'',desc:'',members:[],machines:[],materials:[]}});
  }

  const listDiv=document.getElementById('proj-list');
  if(dayProjects.length===0&&!state.showAddProject){listDiv.innerHTML='<div class="empty">本日尚無施工與成本紀錄</div>';return;}
  
  dayProjects.forEach((proj,pIdx)=>{
    const div=document.createElement('div');div.className='project-card';
    
    let empTotal=0, machTotal=0, matTotal=0;
    
    const empDetails=proj.members.map(id=>{
      const e=employees.find(x=>x.id===id);
      const cost=getEmpWageOnDay(state.selectedDate,id);
      empTotal+=cost;
      return e?`<div class="cost-item-detail"><span>▪️ ${e.name} (人員)</span><span>$${cost.toLocaleString()}</span></div>`:''
    }).join('');

    const machDetails=proj.machines.map(id=>{
      const m=machines.find(x=>x.id===id);
      if(m){machTotal+=m.dailyCost;}
      return m?`<div class="cost-item-detail"><span>▪️ ${m.name} (機械)</span><span>$${m.dailyCost.toLocaleString()}</span></div>`:''
    }).join('');

    // ✨ 修正點：在這裡將每筆耗材的名稱與金額印到畫面上
    const matDetails=(proj.materials||[]).map(m=>{
      matTotal+=m.cost;
      return `<div class="cost-item-detail"><span>▪️ ${m.name} (耗材)</span><span>$${m.cost.toLocaleString()}</span></div>`
    }).join('');

    const grandCost = empTotal + machTotal + matTotal;

    div.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="project-title">🏗️ ${proj.name}</div>
        <button class="btn btn-danger" style="padding:2px 8px;font-size:11px" id="del-proj-${proj.id}">刪除</button>
      </div>
      ${proj.desc?`<div class="project-desc">${proj.desc}</div>`:''}
      
      <div class="cost-box">
        <div class="cost-title">📊 當日成本計算清單</div>
        ${empDetails||machDetails||matDetails?`
          ${empDetails}
          ${machDetails}
          ${matDetails}
        `:'<div class="cost-item-detail" style="color:#94a3b8">無選擇任何計費項目</div>'}
        <div class="cost-total-row">
          <span>💰 項目合計成本</span>
          <span>NT$ ${grandCost.toLocaleString()}</span>
        </div>
      </div>`;
      
    div.querySelector(`#del-proj-${proj.id}`).onclick=()=>{
      if(confirm('確定要刪除此施工與成本項目嗎？')){
        projects[state.selectedDate].splice(pIdx,1);save();render();
      }
    };
    listDiv.appendChild(div);
  });
}

function renderReport(tc){
  const p=state.period;
  tc.innerHTML=`
  <div class="period-bar">
    <label>薪資結算期間：</label>
    <select id="p-year">${[2025,2026,2027].map(y=>`<option${y===p.year?' selected':''}>${y}年</option>`).join('')}</select>
    <select id="p-month">${Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${m}"${m===p.month?' selected':''}>${m}月</option>`).join('')}</select>
    <select id="p-half"><option value="1"${p.half===1?' selected':''}>上半月</option><option value="2"${p.half===2?' selected':''}>下半月</option></select>
  </div>
  <div class="grid" id="rep-grid"></div>
  <div class="grand-total"><div class="label">本期總薪資支出金額</div><div class="amount" id="grand-amt"></div></div>`;
  
  document.getElementById('p-year').onchange=e=>setState({period:{...state.period,year:parseInt(e.target.value)}});
  document.getElementById('p-month').onchange=e=>setState({period:{...state.period,month:parseInt(e.target.value)}});
  document.getElementById('p-half').onchange=e=>setState({period:{...state.period,half:parseInt(e.target.value)}});
  
  const dates=periodDates(p.year,p.month,p.half);
  const grid=document.getElementById('rep-grid');
  let grand=0;
  
  employees.forEach(emp=>{
    let present=0, leave=0, absent=0, bonus=0, wage=0;
    dates.forEach(d=>{
      const r=getRecord(d,emp.id);
      if(r.status==='present')present++;
      else if(r.status==='half')present+=0.5;
      else if(r.status==='leave')leave++;
      else if(r.status==='absent')absent++;
      bonus+=Number(r.bonus||0);
      wage+=getEmpWageOnDay(d,emp.id);
    });
    grand+=wage;
    
    const div=document.createElement('div');div.className='card';
    div.innerHTML=`
      <div style="font-weight:700;font-size:15px;margin-bottom:10px">${emp.name}</div>
      <div class="stat-grid">
        <div class="stat-item" style="border-left:3px solid #22c55e"><div class="stat-label">出勤</div><div class="stat-value">${present} 天</div></div>
        <div class="stat-item" style="border-left:3px solid #f59e0b"><div class="stat-label">請假</div><div class="stat-value">${leave} 天</div></div>
        <div class="stat-item" style="border-left:3px solid #ef4444"><div class="stat-label">缺勤</div><div class="stat-value">${absent} 天</div></div>
        <div class="stat-item" style="border-left:3px solid #8b5cf6"><div class="stat-label">加給</div><div class="stat-value">NT$ ${bonus.toLocaleString()}</div></div>
      </div>
      <div class="total-box">
        <div class="total-label">應付薪資</div>
        <div class="total-amount">NT$ ${wage.toLocaleString()}</div>
      </div>`;
    grid.appendChild(div);
  });
  document.getElementById('grand-amt').textContent=`NT$ ${grand.toLocaleString()}`;
}

function renderHistory(tc){
  const h=state.historyMonth;
  tc.innerHTML=`
  <div class="period-bar">
    <label>員工歷程：</label>
    <select id="h-emp"><option value="">-- 請選擇人員 --</option>${employees.map(e=>`<option value="${e.id}"${state.historyEmp===e.id?' selected':''}>${e.name}</option>`).join('')}</select>
    <select id="h-year">${[2025,2026,2027].map(y=>`<option${y===h.year?' selected':''}>${y}年</option>`).join('')}</select>
    <select id="h-month">${Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${m}"${m===h.month?' selected':''}>${m}月</option>`).join('')}</select>
  </div>
  <div id="history-body"></div>`;
  
  document.getElementById('h-emp').onchange=e=>setState({historyEmp:parseInt(e.target.value)||null});
  document.getElementById('h-year').onchange=e=>setState({historyMonth:{...state.historyMonth,year:parseInt(e.target.value)}});
  document.getElementById('h-month').onchange=e=>setState({historyMonth:{...state.historyMonth,month:parseInt(e.target.value)}});
  
  const body=document.getElementById('history-body');
  if(!state.historyEmp){body.innerHTML='<div class="empty">請選擇員工查看個人出勤歷史</div>';return;}
  
  const emp=employees.find(e=>e.id===state.historyEmp);
  const days=getDays(h.year,h.month);
  const dates=Array.from({length:days},(_,i)=>`${h.year}-${String(h.month).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`);
  let tp=0,tl=0,ta=0,tb=0,tw=0;
  let rows='';
  
  dates.forEach(date=>{
    const r=getRecord(date,state.historyEmp);
    const st=r.status||'none';
    if(st==='present')tp++;else if(st==='half')tp+=0.5;else if(st==='leave')tl++;else if(st==='absent')ta++;
    tb+=Number(r.bonus||0);
    tw+=getEmpWageOnDay(date,state.historyEmp);
    
    rows+=`<div class="history-row">
      <div class="history-date">${fmtDate(date)}</div>
      <div class="badge" style="background:${STATUS_COLOR[st]}">${STATUS_LABEL[st]}</div>
      ${r.bonus>0?`<div class="bonus-badge">加給 +$${Number(r.bonus).toLocaleString()}</div>`:''}
    </div>`;
  });
  
  body.innerHTML=`
    <div style="font-weight:700;font-size:16px;margin-bottom:10px">${emp.name} — ${h.year}年${h.month}月總覽</div>
    <div class="card" style="padding:0;overflow:hidden">${rows}</div>
    <div class="card" style="margin-top:12px">
      <div class="stat-grid">
        <div class="stat-item" style="border-left:3px solid #22c55e"><div class="stat-label">出勤天數</div><div class="stat-value">${tp} 天</div></div>
        <div class="stat-item" style="border-left:3px solid #f59e0b"><div class="stat-label">請假天數</div><div class="stat-value">${tl} 天</div></div>
        <div class="stat-item" style="border-left:3px solid #ef4444"><div class="stat-label">缺勤天數</div><div class="stat-value">${ta} 天</div></div>
        <div class="stat-item" style="border-left:3px solid #8b5cf6"><div class="stat-label">加給合計</div><div class="stat-value">NT$ ${tb.toLocaleString()}</div></div>
      </div>
      <div class="total-box"><div class="total-label">全月薪資總計</div><div class="total-amount">NT$ ${tw.toLocaleString()}</div></div>
    </div>`;
}

function renderSettings(tc){
  tc.innerHTML=`
    <h3 style="font-size:15px;font-weight:700;margin-bottom:8px;color:#1e40af">⚙️ 1. 員工薪資名冊管理</h3>
    <div class="grid" id="settings-emp-grid" style="margin-bottom:20px"></div>
    
    <h3 style="font-size:15px;font-weight:700;margin-bottom:8px;color:#ea580c">⚙️ 2. 機具設備清冊管理</h3>
    <div class="grid" id="settings-mach-grid"></div>
    <button class="btn btn-primary" id="add-new-mach-btn" style="margin-top:10px;width:100%">＋ 新增機械機具項目</button>
    
    <button class="btn btn-secondary" id="add-new-emp-btn" style="margin-top:20px;width:100%;background:#e2e8f0">＋ 新增員工</button>
  `;
  
  const eGrid=document.getElementById('settings-emp-grid');
  employees.forEach(emp=>{
    const div=document.createElement('div');div.className='card';
    if(state.editEmp && state.editEmp.id===emp.id){
      div.innerHTML=`
        <div class="edit-form">
          <input type="text" id="edit-name" value="${state.editEmp.name}"/>
          <div class="bonus-row"><label>日薪 $</label><input type="number" id="edit-wage" value="${state.editEmp.dailyWage}"/></div>
          <div class="btn-row">
            <button class="btn btn-primary" id="save-emp">儲存</button>
            <button class="btn btn-secondary" id="cancel-emp">取消</button>
          </div>
        </div>`;
      div.querySelector('#save-emp').onclick=()=>{
        const name=document.getElementById('edit-name').value.trim();
        const wage=parseInt(document.getElementById('edit-wage').value)||0;
        if(!name)return;
        employees=employees.map(e=>e.id===emp.id?{...e,name,dailyWage:wage}:e);
        save();setState({editEmp:null});
      };
      div.querySelector('#cancel-emp').onclick=()=>setState({editEmp:null});
    } else {
      div.innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div class="emp-name">${emp.name}</div><div class="emp-wage" style="margin-top:2px">日薪 NT$ ${emp.dailyWage.toLocaleString()}</div></div>
          <button class="btn btn-secondary" style="padding:4px 12px" id="edit-emp-${emp.id}">編輯</button>
        </div>`;
      div.querySelector(`#edit-emp-${emp.id}`).onclick=()=>setState({editEmp:{...emp}});
    }
    eGrid.appendChild(div);
  });

  const mGrid=document.getElementById('settings-mach-grid');
  machines.forEach(mach=>{
    const div=document.createElement('div');div.className='card';
    if(state.editMach && state.editMach.id===mach.id){
      div.innerHTML=`
        <div class="edit-form">
          <input type="text" id="edit-mname" value="${state.editMach.name}"/>
          <div class="bonus-row"><label>每日成本 $</label><input type="number" id="edit-mcost" value="${state.editMach.dailyCost}"/></div>
          <div class="btn-row">
            <button class="btn btn-primary" id="save-mach">儲存</button>
            <button class="btn btn-secondary" id="cancel-mach">取消</button>
          </div>
        </div>`;
      div.querySelector('#save-mach').onclick=()=>{
        const name=document.getElementById('edit-mname').value.trim();
        const cost=parseInt(document.getElementById('edit-mcost').value)||0;
        if(!name)return;
        machines=machines.map(m=>m.id===mach.id?{...m,name,dailyCost:cost}:m);
        save();setState({editMach:null});
      };
      div.querySelector('#cancel-mach').onclick=()=>setState({editMach:null});
    } else {
      div.innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div class="emp-name" style="color:#c2410c">${mach.name}</div><div class="emp-wage" style="margin-top:2px">每日進場 NT$ ${mach.dailyCost.toLocaleString()}</div></div>
          <button class="btn btn-secondary" style="padding:4px 12px;background:#fff7ed" id="edit-mach-${mach.id}">編輯</button>
        </div>`;
      div.querySelector(`#edit-mach-${mach.id}`).onclick=()=>setState({editMach:{...mach}});
    }
    mGrid.appendChild(div);
  });

  document.getElementById('add-new-mach-btn').onclick=()=>{
    const name = prompt('請輸入新機械機具名稱：');
    if(!name) return;
    const cost = parseInt(prompt('請輸入每日進場成本金額(元)：')) || 0;
    machines.push({id:Date.now(),name,dailyCost:cost});save();render();
  };
  document.getElementById('add-new-emp-btn').onclick=()=>{
    const name = prompt('請輸入新員工姓名：');
    if(!name) return;
    const wage = parseInt(prompt('請輸入該員工預設日薪(元)：')) || 0;
    employees.push({id:Date.now(),name,dailyWage:wage});save();render();
  };
}

render();
</script>
</body>
</html>
